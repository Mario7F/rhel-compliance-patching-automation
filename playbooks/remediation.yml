

---

- name: Remediation common Linux compliance issues
  hosts: all
  become: yes

  vars:
    required_services:
      - chronyd
      - auditd
      - firewalld
      - rsyslog

  tasks:

    - name: Ensure required packages are installed
      ansible.builtin.package:
        name:
          - chrony
          - firewalld
          - rsyslog
        state: present

    - name: Ensure required services are enabled and running
      ansible.builtin.systemd:
        name: "{{ item }}
        enabled: yes
        state: started
      loop: "{{ required_services }}"

    - name: Ensure SELinux is enforcing
      ansible.builtin.command:
        cmd: setenforce 1
      register: selinux_fix
      failed_when: false
      changed_when: false

    - name: Display SELinux remediation result
      ansible.builtin.debug:
        msg: "SELinux enforcement attempted"

    - name: Allow SSH through firewall
      ansible.builtin.command: firewalld-cmd --permanent --add-service=ssh
      failed_when: false
      
